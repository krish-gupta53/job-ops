services:
  - type: web
    name: job-ops-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./jobops.db
      - key: FRONTEND_URL
        fromService:
          name: job-ops-frontend
          type: web
          property: host
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: job-ops-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: job-ops-backend
          type: web
          property: host
