services:
  - type: web
    name: job-ops-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/jobops.db
      - key: FRONTEND_URL
        fromService:
          type: web
          name: job-ops-frontend
          property: host
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: jobops-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: job-ops-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: job-ops-backend
          property: host
